name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chronolog/package-lock.json

      - name: Install dependencies
        working-directory: chronolog
        run: npm ci

      - name: Build & Package
        working-directory: chronolog
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-windows
          path: |
            chronolog/release/*.exe
            chronolog/release/*.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            chronolog/release/ChronoLog-Setup-*.exe
            chronolog/release/ChronoLog-Portable-*.exe
          draft: true
          generate_release_notes: true
