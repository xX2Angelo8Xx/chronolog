name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Rebuild better-sqlite3 for the arm64 Electron target while on the x64 runner.
      # electron-builder will handle x64 natively; this ensures arm64 binaries are ready.
      - name: Rebuild native modules for arm64
        run: npx @electron/rebuild --arch arm64

      - name: Build & Package
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chronolog-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/ChronoLog-Setup-*.exe
            release/ChronoLog-Setup-*.exe.blockmap
            release/ChronoLog-Portable-*.exe
            release/latest.yml
          draft: false
          generate_release_notes: true
