<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Outer glow gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0078D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0078D4" stop-opacity="0"/>
    </radialGradient>
    <!-- Clock face gradient -->
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0F2440"/>
    </linearGradient>
    <!-- Bezel gradient -->
    <linearGradient id="bezelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="50%" stop-color="#005A9E"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <!-- Progress arc gradient -->
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#40A9FF"/>
      <stop offset="100%" stop-color="#0078D4"/>
    </linearGradient>
    <!-- Hand gradient -->
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#B0D4F1"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Inner shadow for depth -->
    <filter id="innerShadow">
      <feComponentTransfer in="SourceAlpha">
        <feFuncA type="table" tableValues="1 0"/>
      </feComponentTransfer>
      <feGaussianBlur stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#000" flood-opacity="0.25" result="color"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feComposite in2="SourceGraphic" operator="over"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="128" cy="128" r="128" fill="url(#bgGlow)"/>

  <!-- Outer progress arc (270° sweep, stopwatch feel) -->
  <circle cx="128" cy="128" r="118" fill="none" stroke="url(#arcGrad)" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="556 186" stroke-dashoffset="-46" opacity="0.7"/>

  <!-- Outer bezel ring -->
  <circle cx="128" cy="128" r="108" fill="url(#bezelGrad)" filter="url(#shadow)"/>

  <!-- Clock face -->
  <circle cx="128" cy="128" r="100" fill="url(#faceGrad)" filter="url(#innerShadow)"/>

  <!-- Subtle inner ring -->
  <circle cx="128" cy="128" r="96" fill="none" stroke="#0078D4" stroke-width="0.5" opacity="0.3"/>

  <!-- Hour marks (12 positions) -->
  <!-- 12 o'clock -->
  <rect x="126" y="38" width="4" height="14" rx="2" fill="#FFFFFF" opacity="0.9"/>
  <!-- 1 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(30 128 128)"/>
  <!-- 2 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(60 128 128)"/>
  <!-- 3 o'clock -->
  <rect x="126" y="38" width="4" height="14" rx="2" fill="#FFFFFF" opacity="0.9" transform="rotate(90 128 128)"/>
  <!-- 4 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(120 128 128)"/>
  <!-- 5 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(150 128 128)"/>
  <!-- 6 o'clock -->
  <rect x="126" y="38" width="4" height="14" rx="2" fill="#FFFFFF" opacity="0.9" transform="rotate(180 128 128)"/>
  <!-- 7 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(210 128 128)"/>
  <!-- 8 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(240 128 128)"/>
  <!-- 9 o'clock -->
  <rect x="126" y="38" width="4" height="14" rx="2" fill="#FFFFFF" opacity="0.9" transform="rotate(270 128 128)"/>
  <!-- 10 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(300 128 128)"/>
  <!-- 11 -->
  <rect x="126" y="38" width="4" height="10" rx="2" fill="#FFFFFF" opacity="0.6" transform="rotate(330 128 128)"/>

  <!-- Minute dots between hour marks (small subtle dots) -->
  <g opacity="0.2">
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(6 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(12 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(18 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(24 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(36 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(42 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(48 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(54 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(66 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(72 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(78 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(84 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(96 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(102 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(108 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(114 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(126 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(132 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(138 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(144 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(156 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(162 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(168 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(174 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(186 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(192 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(198 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(204 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(216 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(222 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(228 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(234 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(246 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(252 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(258 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(264 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(276 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(282 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(288 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(294 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(306 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(312 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(318 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(324 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(336 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(342 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(348 128 128)"/>
    <circle cx="128" cy="42" r="1.2" fill="#FFFFFF" transform="rotate(354 128 128)"/>
  </g>

  <!-- Stopwatch sub-dial (small circle at top) -->
  <circle cx="128" cy="82" r="16" fill="none" stroke="#0078D4" stroke-width="1.5" opacity="0.5"/>
  <circle cx="128" cy="82" r="1" fill="#40A9FF"/>
  <!-- Sub-dial tick marks -->
  <rect x="127.5" y="68" width="1" height="4" rx="0.5" fill="#0078D4" opacity="0.5"/>
  <rect x="127.5" y="68" width="1" height="4" rx="0.5" fill="#0078D4" opacity="0.5" transform="rotate(90 128 82)"/>
  <rect x="127.5" y="68" width="1" height="4" rx="0.5" fill="#0078D4" opacity="0.5" transform="rotate(180 128 82)"/>
  <rect x="127.5" y="68" width="1" height="4" rx="0.5" fill="#0078D4" opacity="0.5" transform="rotate(270 128 82)"/>
  <!-- Sub-dial hand -->
  <line x1="128" y1="82" x2="128" y2="70" stroke="#40A9FF" stroke-width="1" stroke-linecap="round" opacity="0.8"/>

  <!-- Hour hand (pointing to ~10 o'clock position) -->
  <line x1="128" y1="128" x2="96" y2="72" stroke="url(#handGrad)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Minute hand (pointing to ~2 o'clock position) -->
  <line x1="128" y1="128" x2="166" y2="58" stroke="url(#handGrad)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Second hand (thin, accent color, pointing to ~7 o'clock) -->
  <line x1="128" y1="128" x2="104" y2="182" stroke="#40A9FF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Second hand counterweight -->
  <line x1="128" y1="128" x2="134" y2="106" stroke="#40A9FF" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center cap -->
  <circle cx="128" cy="128" r="6" fill="#0078D4"/>
  <circle cx="128" cy="128" r="3.5" fill="#FFFFFF"/>

  <!-- Stopwatch button at top (crown) -->
  <rect x="124" y="14" width="8" height="8" rx="2" fill="#005A9E" stroke="#0078D4" stroke-width="1"/>
  <rect x="126" y="10" width="4" height="6" rx="1.5" fill="#005A9E" stroke="#0078D4" stroke-width="1"/>

  <!-- Side button (stopwatch start/stop) -->
  <rect x="230" y="108" width="8" height="14" rx="2" fill="#005A9E" stroke="#0078D4" stroke-width="1"/>
  <rect x="230" y="130" width="8" height="10" rx="2" fill="#005A9E" stroke="#0078D4" stroke-width="1"/>
</svg>